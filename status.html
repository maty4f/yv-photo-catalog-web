<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מצב המערכת — קטלוג</title>
<link rel="stylesheet" href="yv-theme.css?v=20260722">
<style>
  body { padding:20px; }
  .wrap { max-width: 1020px; margin:0 auto; }
  h1 { font-size:21px; margin:0 0 2px; font-weight:800; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
  .upd { float:left; font-size:12px; color:var(--muted); font-weight:400; font-family:ui-monospace,"SF Mono",Menlo,monospace; direction:ltr; unicode-bidi:isolate; }
  .bar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .tile { flex:1; min-width:120px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 14px; text-align:center; }
  .tn { font-size:22px; font-weight:800; color:var(--brand); unicode-bidi:isolate; font-variant-numeric:tabular-nums; text-shadow:0 0 12px color-mix(in srgb, var(--brand) 40%, transparent); }
  .tl { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(232px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px 16px; }
  .card.kind { border-width:1px; border-color:var(--line-strong); box-shadow:0 8px 24px -14px rgba(0,0,0,.6); }
  .card h3 { margin:0 0 8px; font-size:12.5px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
  .big { font-size:20px; font-weight:700; margin-bottom:6px; }
  .row { display:flex; justify-content:space-between; gap:8px; font-size:13px; padding:2px 0; color:var(--ink); }
  .row b { unicode-bidi:isolate; font-variant-numeric:tabular-nums; }
  .dot { display:inline-block; width:11px; height:11px; border-radius:50%; margin-left:7px; vertical-align:middle; }
  .ok{background:var(--good);box-shadow:0 0 8px var(--good)} .bad{background:var(--error);box-shadow:0 0 8px var(--error)}
  .pill { padding:2px 10px; border-radius:11px; font-size:12.5px; font-weight:700; }
  .pill.ok{background:color-mix(in srgb, var(--good) 18%, transparent);color:var(--good)}
  .pill.warn{background:color-mix(in srgb, var(--warn) 18%, transparent);color:var(--warn)}
  .pill.bad{background:color-mix(in srgb, var(--error) 18%, transparent);color:var(--error)}
  .pill.unk{background:var(--card-hover);color:var(--muted)}
  .muted{color:var(--muted);font-size:11px;margin-top:4px;unicode-bidi:isolate}
  .errlist div { font-size:11.5px; color:var(--error); padding:4px 0; border-top:1px dashed var(--line); unicode-bidi:isolate; direction:ltr; text-align:left; }
  .log { max-height:300px; overflow-y:auto; background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 13px; margin-top:4px; }
  .ll { font-size:12px; color:var(--ink); padding:2.5px 0; line-height:1.5; unicode-bidi:isolate; border-bottom:1px solid var(--line); font-family:ui-monospace,"SF Mono",Menlo,monospace; }
  .ll:last-child{border-bottom:none}
  .le { color:var(--error); } .lw { color:var(--warn); }
  .livehead { display:flex; align-items:center; gap:8px; }
  .blink { width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good); animation:bl 1.1s infinite; }
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
  .tbl { width:100%; border-collapse:collapse; font-size:12.5px; }
  .tbl th { text-align:right; color:var(--muted); font-weight:700; font-size:11.5px; padding:5px 8px; border-bottom:2px solid var(--line-strong); text-transform:uppercase; letter-spacing:.02em; }
  .tbl td { padding:5px 8px; border-bottom:1px solid var(--line); unicode-bidi:isolate; color:var(--ink); }
  .tbl td.nm { font-weight:600; max-width:230px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tbl td.of { color:var(--muted); font-size:11px; direction:ltr; text-align:left; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:ui-monospace,"SF Mono",Menlo,monospace; }
  .tbl tr:hover td { background:var(--card-hover); }
</style>
</head>
<body>
<div class="wrap">
  <h1>מצב מערכת הקטלוג <span class="upd" id="upd">—</span></h1>
  <div class="sub">סרטים · תצלומים · מסמכים — מעקב מפורט · רענון אוטומטי (5 ש׳ בזמן קטלוג, 15 ש׳ אחרת)</div>
  <div class="bar" id="bar"></div>
  <div class="grid" id="grid"><div class="card">טוען…</div></div>
</div>
<script src="status.inline1.js?v=20260722e"></script>
<script src="yv-client-log.js?v=20260722d"></script>
</body>
</html>
