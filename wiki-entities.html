<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ישויות מקושרות — ויקי הארכיון</title>
<link rel="stylesheet" href="yv-theme.css?v=20260722">
<style>
  :root { --accent:var(--tik); --accent-2:#c9a6ff; }
  body { padding:20px; }
  .wrap { max-width:1180px; margin:0 auto; padding-bottom:60px; }
  h1 { font-size:21px; margin:0 0 2px; font-weight:800; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }

  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:16px; box-shadow:0 10px 28px -18px rgba(0,0,0,.7); }

  .srow { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12.5px; color:var(--muted); margin-bottom:14px; }
  .srow input { direction:ltr; text-align:left; padding:5px 9px; border:1px solid var(--line); border-radius:var(--radius-sm);
                background:var(--tint); color:var(--ink); font-family:inherit; font-size:12.5px; min-width:260px; }
  .srow input:focus { outline:none; border-color:var(--accent); }

  .counters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .tile { flex:1; min-width:150px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm); padding:10px 14px; text-align:center; }
  .tn { font-size:22px; font-weight:800; color:var(--accent); unicode-bidi:isolate; font-variant-numeric:tabular-nums; }
  .tl { font-size:11.5px; color:var(--muted); margin-top:2px; }

  .tabs { display:flex; gap:8px; margin-bottom:12px; }
  .tab { background:var(--tint); border:1px solid var(--line); border-radius:999px; padding:7px 18px; cursor:pointer;
         font-family:inherit; font-size:13.5px; color:var(--ink); }
  .tab.active { background:var(--accent); color:#150a22; font-weight:700; border-color:var(--accent); }

  .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:4px; }
  #q { min-width:260px; flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:var(--radius-sm);
       background:var(--tint); color:var(--ink); font-family:inherit; font-size:14.5px; direction:rtl; text-align:right; }
  #q:focus { outline:none; border-color:var(--accent); background:var(--card); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }

  .count-line { font-size:12.5px; color:var(--muted); margin:10px 0 6px; }

  table.tbl { width:100%; border-collapse:collapse; font-size:13px; direction:rtl; text-align:right; }
  .tbl th, .tbl td { border-bottom:1px solid var(--line); padding:7px 9px; text-align:right; vertical-align:top; unicode-bidi:isolate; color:var(--ink); }
  .tbl th { color:var(--muted); font-weight:700; font-size:11.5px; border-bottom:2px solid var(--line-strong); white-space:nowrap; position:sticky; top:0; background:var(--card); }
  .tbl tr:hover td { background:var(--card-hover); }
  .tbl td.nm { font-weight:700; }
  .tbl td.nm small { font-weight:400; color:var(--muted); }
  .tbl td.tik a { color:var(--accent); text-decoration:none; display:block; margin-bottom:2px; }
  .tbl td.tik a:hover { text-decoration:underline; }
  .tbl-wrap { max-height:70vh; overflow:auto; border:1px solid var(--line); border-radius:var(--radius-sm); }
  .ntiks { display:inline-block; background:var(--accent); color:#150a22; border-radius:999px; padding:0 9px;
           font-weight:800; font-size:12px; font-variant-numeric:tabular-nums; }
  .conflict { color:#e0b000; }

  .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
  .empty-state code { display:block; direction:ltr; text-align:center; background:var(--tint); border:1px solid var(--line);
                       border-radius:var(--radius-sm); padding:10px 14px; margin:14px auto; max-width:560px; font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:13px; color:var(--ink); unicode-bidi:isolate; }
  .empty-state .big { font-size:15px; color:var(--ink); margin-bottom:6px; }
  .none { color:var(--muted); text-align:center; padding:24px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" style="text-decoration:none;display:inline-block;margin-bottom:10px">
    <button type="button" class="gear" style="border-radius:7px;padding:8px 16px;font-size:14px;">← דף הבית</button>
  </a>
  <h1>ישויות מקושרות — ויקי הארכיון</h1>
  <div class="sub">אנשים ומקומות שמופיעים ביותר מתיק אחד — הצלבה אוטומטית של מפתחות-השמות מכל תיאורי-התיק. ערך סותר בין תיקים מסומן <span class="conflict">⚠</span> (לעולם לא ממוזג בשקט). עדכון: <code style="unicode-bidi:isolate">python3 cli/yv.py doc names</code></div>

  <div class="srow">
    <span>כתובת שרת מקומי / tunnel:</span>
    <input type="text" id="server-url" placeholder="ריק = אותו שרת שמגיש דף זה" autocomplete="off">
    <span id="server-hint"></span>
  </div>

  <div id="app">
    <div class="none">טוען…</div>
  </div>
</div>

<script src="wiki-entities.inline1.js?v=20260722e"></script>
</body>
</html>
